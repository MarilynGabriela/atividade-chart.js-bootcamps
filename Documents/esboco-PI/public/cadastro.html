<body onload="listar()">
  <!--header inicio-->
  
  <div class="header">
    <div class="container">
      <h1 class="titulo"><b>Tierra de Recuerdos</b></h1>
      <ul class="navbar">
        <li class="agora">
          <a href="index.html">Home</a>

        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bien-Venido!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->

    <div class="container">

      <span class="version">v1.0.0</span>
    </div>
  </div>
  <!--footer fim-->

</html><script>
function cadastrar() {

  let nome = nome_input.value.trim();
  let email = email_input.value.trim();
  let senha = senha_input.value;
  let confirmacao = confirmacao_senha_input.value;

  if (nome == "" || email == "" || senha == "" || confirmacao == "") {
    alert("Preencha todos os campos!");
    return;
  }

  if (nome.length < 3) {
    alert("Nome deve ter pelo menos 3 caracteres.");
    return;
  }

  if (!email.includes("@") || !email.includes(".")) {
    alert("E-mail inválido.");
    return;
  }

  if (senha.length < 6) {
    alert("Senha deve ter no mínimo 6 caracteres.");
    return;
  }

  let temNumero = false;
  for (let i = 0; i < senha.length; i++) {
    if (!isNaN(senha[i])) {
      temNumero = true;
      break;
    }
  }

  if (!temNumero) {
    alert("A senha precisa ter pelo menos 1 número.");
    return;
  }

  if (senha != confirmacao) {
    alert("As senhas não coincidem.");
    return;
  }

  alert("Cadastro realizado com sucesso!");

  nome_input.value = "";
  email_input.value = "";
  senha_input.value = "";
  confirmacao_senha_input.value = "";
}
</script>
